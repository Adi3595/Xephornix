<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#172B36"/>
  
  <!-- Outer hollow X structure -->
  <!-- Base thick white lines -->
  <g stroke="#F1F6F4" stroke-width="80" stroke-linecap="square">
    <line x1="140" y1="140" x2="372" y2="372"/>
    <line x1="372" y1="140" x2="140" y2="372"/>
  </g>
  <!-- Inner dark lines to hollow out the white lines -->
  <g stroke="#172B36" stroke-width="40" stroke-linecap="square">
    <line x1="120" y1="120" x2="392" y2="392"/>
    <line x1="392" y1="120" x2="120" y2="392"/>
  </g>

  <!-- Inner circuit lines -->
  <g stroke="#F1F6F4" stroke-width="12" stroke-linecap="round">
    <line x1="160" y1="160" x2="352" y2="352"/>
    <line x1="352" y1="160" x2="160" y2="352"/>
  </g>
  
  <!-- Circuit nodes -->
  <g fill="#F1F6F4">
    <circle cx="160" cy="160" r="16"/>
    <circle cx="352" cy="352" r="16"/>
    <circle cx="352" cy="160" r="16"/>
    <circle cx="160" cy="352" r="16"/>
  </g>

  <!-- Center clearing -->
  <circle cx="256" cy="256" r="32" fill="#172B36"/>
  
  <!-- Center yellow core -->
  <circle cx="256" cy="256" r="20" fill="#FFC801"/>
</svg>
